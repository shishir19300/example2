<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment - Olulu Cuts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

    <main class="booking-card">
        <h2>Book Your Master</h2>
        <p class="barber-info" id="selected-barber-name">Oulu Cuts Appointment</p>

        <form id="bookingForm">
            <div class="mb-3">
                <label class="form-label">FULL NAME</label>
                <input type="text" id="customer_name" class="form-control" placeholder="John Doe" required>
            </div>

            <div class="mb-3">
                <label class="form-label">PHONE NUMBER</label>
                <input type="tel" id="phone" class="form-control" placeholder="+358..." required>
            </div>

            <div class="row">
                <div class="col-6 mb-3">
                    <label class="form-label">DATE</label>
                    <input type="date" id="booking_date" class="form-control" required>
                </div>
                <div class="col-6 mb-3">
                    <label class="form-label">TIME</label>
                    <input type="time" id="booking_time" class="form-control" required>
                </div>
            </div>

            <button type="submit" class="btn-confirm">Confirm Booking</button>
            
            <a href="index.html" class="back-link">Cancel and go back</a>
            <p class="status"></p>
        </form>
    </main>

    <script src="js/booking.js"></script>
</body>
</html>
